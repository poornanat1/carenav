name: Eval gates

# The golden CUJ suite (docs/09): real models + a seeded Postgres. Runs nightly, on
# demand, on pushes to main, and on PRs labeled `run-eval` — each run spends real model
# quota, so it is not on by default for every PR. A gate trip (missed-escalation > 0 or
# PII-leak > 0) or a soft-threshold miss fails the job via `make eval`'s exit code.
#
# Secrets required: FIREWORKS_API_KEY (generation), MISTRAL_API_KEY (embeddings).
# Optional repo variable: PII_MODEL (fine-tuned detector route; field + regex layers
# carry the PII gate without it).
#
# The seeded database is cached as a pg_dump keyed by the data-pipeline sources, so the
# expensive cold path (Synthea generation + KB embedding spend) runs only when the
# pipeline changes.

on:
  schedule:
    - cron: "17 6 * * *" # nightly
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  eval:
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'run-eval')
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: carenav
          POSTGRES_PASSWORD: carenav
          POSTGRES_DB: carenav
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U carenav"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://carenav:carenav@localhost:5433/carenav
      PGPASSWORD: carenav
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      PII_MODEL: ${{ vars.PII_MODEL }}
      # Mirror the production provider setup: generation on Mistral, PII LoRA on
      # Fireworks. Without these the config falls back to Fireworks default routes,
      # which are not deployed — generation 404s and the missed-escalation gate
      # (correctly) trips on the classifier-dependent emergent case.
      MODEL_PROVIDER: mistral
      MODEL_SMALL: mistral-small-latest
      MODEL_FRONTIER: mistral-large-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Restore seeded-database cache
        id: dbcache
        uses: actions/cache@v4
        with:
          path: data_artifacts/db.dump
          key: carenav-data-${{ hashFiles('src/carenav/data/**', 'src/carenav/rag/**', 'scripts/run_synthea.sh', 'scripts/generate_condition_index.py') }}

      - name: Load cached database
        if: steps.dbcache.outputs.cache-hit == 'true'
        run: |
          pg_restore --no-owner -h localhost -p 5433 -U carenav -d carenav data_artifacts/db.dump

      - name: Seed database (cold path — Synthea + full data pipeline)
        if: steps.dbcache.outputs.cache-hit != 'true'
        run: |
          bash scripts/run_synthea.sh 200
          make data
          pg_dump -Fc -h localhost -p 5433 -U carenav -d carenav -f data_artifacts/db.dump

      # The PII detector runs on a dedicated 1-GPU deployment (Fireworks has no serverless
      # LoRA-addon serving) with scale-to-zero, so the next two steps bring it up before the
      # suite. A replica only serves when minReplicaCount>=1: with scale-to-zero the deployment
      # reads READY at 0 replicas, but warm-up traffic 404s ("not deployed") and can't itself
      # trigger a cold start, so max>=1 alone deadlocks — min>=1 is what forces a replica up.
      # The counts drift back to 0 out-of-band (capacity probes, manual edits), so rather than
      # rely on them staying set, this step PATCHes min/max>=1 itself. It is BEST-EFFORT: if the
      # scale or warm-up fails (H200 capacity has been flaky — A100/H100 provisioning was down
      # on 2026-07-09; glm-5p1 needs 16+ GPUs and is not an option), we do NOT fail the job.
      # Instead the warm-up step clears PII_MODEL for the rest of the run so the suite proceeds
      # on the field + regex redaction layers, which carry the PII gate on their own. That keeps
      # the nightly green through GPU outages instead of turning every outage into a red build.
      - name: Ensure the PII deployment can scale up (best-effort self-heal)
        if: env.PII_MODEL != ''
        continue-on-error: true
        run: |
          # PII_MODEL is "<model>#<deployment>"; the deployment path is after the '#'.
          deployment="${PII_MODEL#*#}"
          if [ "$deployment" = "$PII_MODEL" ]; then
            echo "PII_MODEL has no #<deployment> segment; skipping self-heal." >&2
            exit 0
          fi
          echo "Patching ${deployment} to min/maxReplicaCount=1"
          code=$(curl -s -o /tmp/pii-scale.json -w "%{http_code}" -X PATCH \
            "https://api.fireworks.ai/v1/${deployment}?updateMask=min_replica_count,max_replica_count" \
            -H "Authorization: Bearer ${FIREWORKS_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"minReplicaCount": 1, "maxReplicaCount": 1}')
          if [ "$code" != "200" ]; then
            echo "Scale request failed (HTTP $code); warm-up will decide whether to degrade:" >&2
            cat /tmp/pii-scale.json >&2; echo >&2
          else
            echo "Scale request accepted; warm-up waits for the replica to come up."
          fi

      - name: Warm the PII detector deployment (or degrade to field+regex)
        if: env.PII_MODEL != ''
        run: |
          for i in $(seq 1 36); do
            code=$(curl -s -o /tmp/pii-warm.json -w "%{http_code}" \
              https://api.fireworks.ai/inference/v1/chat/completions \
              -H "Authorization: Bearer ${FIREWORKS_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"model\": \"${PII_MODEL}\", \"max_tokens\": 8, \"messages\": [{\"role\": \"user\", \"content\": \"warm-up\"}]}")
            if [ "$code" = "200" ]; then echo "PII deployment ready"; exit 0; fi
            echo "waiting for PII deployment (HTTP $code, attempt $i/36)"; sleep 10
          done
          # Deployment never came up. Rather than run the suite against a cold detector (whose
          # 404s could trip the PII-leak gate on a false pretext) OR hard-fail the nightly on a
          # GPU outage, drop the fine-tuned route for the rest of the job. The field + regex
          # layers still enforce the PII gate; `make eval` treats an empty PII_MODEL as
          # "unconfigured" (commit 1c08e3b) rather than erroring. We also exclude CUJ-9b — its
          # planted email + reformatted DOB are ONLY catchable by the model layer, so judging
          # the PII-leak gate on them with layer 2 down would be a false failure. CUJ-9a/9c
          # (field + regex probes) still run, so the gate is still exercised on the live layers.
          echo "::warning::PII deployment did not become ready; degrading to field+regex layers (PII_MODEL cleared, CUJ-9b excluded)."
          echo "PII_MODEL=" >> "$GITHUB_ENV"
          echo "EVAL_DEGRADED_EXCLUDE=--exclude CUJ-9b" >> "$GITHUB_ENV"

      - name: Preflight (fixtures, member resolution, backend)
        run: make eval-check

      - name: Run the golden CUJ suite
        # EVAL_DEGRADED_EXCLUDE is empty on a healthy run and "--exclude CUJ-9b" when the
        # warm-up step degraded to field+regex (model-only PII probes can't be fairly judged).
        run: make eval EVAL_ARGS="${EVAL_DEGRADED_EXCLUDE}"

      - name: Publish report to job summary
        if: always()
        run: |
          if [ -f data_artifacts/eval/report.md ]; then
            cat data_artifacts/eval/report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: data_artifacts/eval/
          if-no-files-found: ignore

      # The self-heal pins minReplicaCount=1 for the run (a scale-to-zero deployment can't be
      # warmed by traffic alone). Reset it to 0 unconditionally so a mid-job failure can't leave
      # a paid H200 replica running 24/7 — the deployment scales itself back down when idle.
      # Uses vars.PII_MODEL, not env.PII_MODEL, since the degrade path clears the latter.
      - name: Reset PII deployment to scale-to-zero
        if: always() && vars.PII_MODEL != ''
        continue-on-error: true
        env:
          PII_MODEL_REF: ${{ vars.PII_MODEL }}
        run: |
          deployment="${PII_MODEL_REF#*#}"
          [ "$deployment" = "$PII_MODEL_REF" ] && exit 0
          echo "Resetting ${deployment} to minReplicaCount=0"
          curl -s -o /dev/null -w "reset HTTP %{http_code}\n" -X PATCH \
            "https://api.fireworks.ai/v1/${deployment}?updateMask=min_replica_count" \
            -H "Authorization: Bearer ${FIREWORKS_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"minReplicaCount": 0}' || true
