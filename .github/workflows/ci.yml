name: CI

# Hermetic checks on every push/PR: lint + the test suite. DB- and model-backed tests
# self-skip via the conftest markers, so this job needs no secrets and no services.
# The eval gates (real models + seeded DB) run in eval.yml.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Lint (ruff + mypy)
        run: make lint
      - name: Tests (hermetic — DB/model tests self-skip)
        run: make test
